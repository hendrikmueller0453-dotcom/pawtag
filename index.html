<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier-Tag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --pine: #1B2A20;
    --pine-deep: #121C15;
    --cream: #F3EEE1;
    --leather: #B9702F;
    --leather-dark: #96591F;
    --moss: #5C7A52;
    --ink: #201C14;
    --alert: #A63D2C;
    --ring-w: 3px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.04), transparent 60%),
      var(--pine);
    font-family:'Inter', sans-serif;
    color:var(--cream);
    display:flex;
    justify-content:center;
    padding: 32px 16px 60px;
  }
  .wrap{ width:100%; max-width:440px; }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color: rgba(243,238,225,0.55);
    text-align:center;
    margin-bottom: 18px;
  }

  /* ---- The Tag (signature element) ---- */
  .tag{
    position:relative;
    background: var(--cream);
    color: var(--ink);
    border-radius: 22px;
    padding: 44px 26px 28px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 2px 0 rgba(255,255,255,0.4) inset;
  }
  .tag::before{
    /* the punched hole + grommet ring */
    content:"";
    position:absolute;
    top: -16px;
    left:50%;
    transform: translateX(-50%);
    width: 34px; height:34px;
    border-radius:50%;
    background: var(--pine);
    box-shadow:
      0 0 0 var(--ring-w) rgba(0,0,0,0.15),
      0 3px 8px rgba(0,0,0,0.45);
  }
  .tag::after{
    content:"";
    position:absolute;
    top:-9px; left:50%;
    transform:translateX(-50%);
    width:14px;height:14px;
    border-radius:50%;
    background: var(--pine-deep);
  }

  .tag-id{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-align:center;
    color: rgba(32,28,20,0.45);
    margin-bottom: 10px;
  }

  h1.pet-name{
    font-family:'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight:700;
    font-size: 34px;
    line-height:1.05;
    text-align:center;
    margin: 0 0 4px;
  }
  .pet-sub{
    text-align:center;
    font-size:14px;
    color: rgba(32,28,20,0.6);
    margin-bottom: 26px;
  }

  .divider{
    border:none;
    border-top: 1px dashed rgba(32,28,20,0.18);
    margin: 22px 0;
  }

  .field-row{ margin-bottom: 16px; }
  .field-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: rgba(32,28,20,0.5);
    display:block;
    margin-bottom:4px;
  }
  .field-value{
    font-size: 17px;
    font-weight:500;
    line-height:1.4;
  }
  .field-value a{ color: var(--leather-dark); text-decoration:none; }
  .field-value a:hover{ text-decoration:underline; }

  .medical{
    background: rgba(166,61,44,0.08);
    border: 1px solid rgba(166,61,44,0.25);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .medical .field-label{ color: var(--alert); }

  .reward{
    background: rgba(92,122,82,0.1);
    border: 1px solid rgba(92,122,82,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .reward .field-label{ color: var(--moss); }

  /* buttons */
  .btn{
    width:100%;
    border:none;
    border-radius: 12px;
    padding: 14px 18px;
    font-family:'Inter', sans-serif;
    font-size: 15px;
    font-weight:600;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{
    background: var(--leather);
    color: var(--cream);
  }
  .btn-primary:hover{ background: var(--leather-dark); }
  .btn-ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(32,28,20,0.25);
  }
  .btn-ghost:hover{ background: rgba(32,28,20,0.05); }
  .btn-link{
    background:none;
    border:none;
    color: rgba(243,238,225,0.6);
    font-family:'Inter', sans-serif;
    font-size: 13px;
    cursor:pointer;
    text-decoration:underline;
    padding: 8px;
  }

  .stack > * + *{ margin-top: 10px; }

  /* forms */
  input, select, textarea{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size: 15px;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1px solid rgba(32,28,20,0.2);
    background: #fff;
    color: var(--ink);
  }
  input:focus, select:focus, textarea:focus{
    outline: 2px solid var(--leather);
    outline-offset: 1px;
  }
  textarea{ resize: vertical; min-height: 64px; }
  label.form-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: rgba(32,28,20,0.55);
    display:block;
    margin-bottom: 5px;
  }
  .form-group{ margin-bottom: 14px; }
  .form-title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 22px;
    margin: 0 0 4px;
  }
  .form-desc{
    font-size: 13px;
    color: rgba(32,28,20,0.55);
    margin-bottom: 20px;
  }
  .form-error{
    background: rgba(166,61,44,0.1);
    color: var(--alert);
    border-radius:8px;
    padding:9px 12px;
    font-size:13px;
    margin-bottom:14px;
  }

  .footer-note{
    text-align:center;
    font-size: 12px;
    color: rgba(243,238,225,0.4);
    margin-top: 22px;
    line-height:1.6;
  }
  .footer-note code{
    font-family:'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.08);
    padding:2px 5px;
    border-radius:4px;
  }
  .footer-note button.linklike{
    background:none;border:none;color:inherit;text-decoration:underline;
    cursor:pointer; font-size:12px; padding:0;
  }

  .skeleton{
    text-align:center;
    padding: 60px 0;
    color: rgba(243,238,225,0.5);
    font-size:14px;
  }

  @media (prefers-reduced-motion: reduce){
    .btn{ transition:none; }
  }

  /* ---------- ADMIN ---------- */
  .admin-wrap{ max-width: 720px; }
  .admin-card{
    background: var(--cream);
    color: var(--ink);
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
  }
  .admin-title{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 26px;
    margin: 0 0 4px;
  }
  .admin-sub{
    font-size:13px;
    color: rgba(32,28,20,0.55);
    margin-bottom: 22px;
  }
  .admin-toolbar{
    display:flex;
    gap:10px;
    margin-bottom: 22px;
  }
  .admin-toolbar .btn{ width:auto; padding:12px 18px; }
  .tag-list{ display:flex; flex-direction:column; gap:12px; }
  .tag-item{
    border:1px solid rgba(32,28,20,0.14);
    border-radius: 14px;
    padding: 16px;
    display:flex;
    gap: 16px;
    align-items:flex-start;
  }
  .tag-item-qr{
    flex-shrink:0;
    width: 76px; height:76px;
    background:#fff;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .tag-item-qr img{ width:100%; height:100%; }
  .tag-item-body{ flex:1; min-width:0; }
  .tag-item-id{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.04em;
  }
  .badge{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    padding:3px 8px;
    border-radius:6px;
    margin-left:8px;
    vertical-align:middle;
  }
  .badge-open{ background: rgba(185,112,47,0.15); color: var(--leather-dark); }
  .badge-active{ background: rgba(92,122,82,0.18); color: var(--moss); }
  .tag-item-pet{ font-size:15px; font-weight:600; margin-top:2px; }
  .tag-item-meta{ font-size:12px; color:rgba(32,28,20,0.5); margin-top:2px; }
  .tag-item-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .mini-btn{
    font-family:'Inter', sans-serif;
    font-size:12px;
    font-weight:600;
    border:1px solid rgba(32,28,20,0.2);
    background:#fff;
    color:var(--ink);
    border-radius:8px;
    padding:6px 10px;
    cursor:pointer;
  }
  .mini-btn:hover{ background: rgba(32,28,20,0.05); }
  .mini-btn.danger{ color: var(--alert); border-color: rgba(166,61,44,0.3); }
  .empty-state{
    text-align:center;
    padding: 40px 20px;
    color: rgba(32,28,20,0.5);
    font-size:14px;
  }
  .admin-gate{ text-align:center; }
</style>
</head>
<body>
<div class="wrap" id="mainWrap">
  <div class="eyebrow" id="eyebrow">TIER-TAG · SCAN-SEITE</div>
  <div class="tag" id="tagCard">
    <div class="skeleton">Lade Tag-Daten …</div>
  </div>
  <div class="footer-note" id="footerNote"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCs2_1HayAtDVBdat92XnBRN41o6o9Vhak",
    authDomain: "pawtag-1.firebaseapp.com",
    projectId: "pawtag-1",
    storageBucket: "pawtag-1.firebasestorage.app",
    messagingSenderId: "743584428098",
    appId: "1:743584428098:web:ea6e760379acb73066bddb"
  };
  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);
  const TAGS_COLLECTION = 'tags';

(function(){
  const params = new URLSearchParams(window.location.search);
  const isAdmin = params.get('admin') === '1';

  if(isAdmin){
    initAdmin();
    return;
  }

  let tagId = params.get('tag');
  if(!tagId){
    tagId = 'A1B2-3XQ9';
    params.set('tag', tagId);
    history.replaceState(null, '', '?' + params.toString());
  }

  const card = document.getElementById('tagCard');
  const eyebrow = document.getElementById('eyebrow');
  const footerNote = document.getElementById('footerNote');
  let profileCache = null;

  function esc(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function renderFooter(profileExists){
    footerNote.innerHTML =
      'Tag-ID <code>' + esc(tagId) + '</code><br>' +
      '<button class="linklike" id="newTagBtn">Neues Test-Tag simulieren</button>';
    document.getElementById('newTagBtn').onclick = function(){
      const rnd = Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
      const p = new URLSearchParams(window.location.search);
      p.set('tag', rnd);
      window.location.search = p.toString();
    };
  }

  async function loadProfile(){
    try{
      const snap = await getDoc(doc(db, TAGS_COLLECTION, tagId));
      return snap.exists() ? snap.data() : null;
    }catch(e){
      console.error('Firestore load error:', e);
      return null;
    }
  }

  async function saveProfile(data){
    await setDoc(doc(db, TAGS_COLLECTION, tagId), data);
  }

  function fieldBlock(label, value, isLink){
    if(!value) return '';
    const inner = isLink ? '<a href="'+ (isLink==='tel' ? 'tel:' : 'mailto:') + esc(value) +'">' + esc(value) + '</a>' : esc(value);
    return '<div class="field-row"><span class="field-label">'+label+'</span><div class="field-value">'+inner+'</div></div>';
  }

  // ---------- VIEW: not yet registered ----------
  function renderUnregistered(){
    eyebrow.textContent = 'NOCH NICHT AKTIVIERT';
    card.innerHTML =
      '<div class="tag-id">TAG · ' + esc(tagId) + '</div>' +
      '<h1 class="pet-name" style="font-size:26px;">Dieses Tag wartet noch auf dich</h1>' +
      '<p class="pet-sub">Richte es einmal ein, dann ist dein Tier ab sofort auffindbar.</p>' +
      '<div class="stack">' +
        '<button class="btn btn-primary" id="registerBtn">Jetzt einrichten</button>' +
      '</div>';
    document.getElementById('registerBtn').onclick = renderRegisterForm;
    renderFooter(false);
  }

  function renderRegisterForm(){
    eyebrow.textContent = 'EINRICHTUNG';
    card.innerHTML =
      '<div class="form-title">Tag einrichten</div>' +
      '<div class="form-desc">Diese Angaben sieht jede Person, die das Tier findet. Das Passwort brauchst du später, um Änderungen vorzunehmen.</div>' +
      '<div id="formError"></div>' +
      '<div class="form-group"><label class="form-label">Name des Tiers</label><input id="f_name" placeholder="z. B. Mochi"></div>' +
      '<div class="form-group"><label class="form-label">Tierart</label>' +
        '<select id="f_species"><option value="Hund">Hund</option><option value="Katze">Katze</option><option value="Anderes">Anderes</option></select></div>' +
      '<div class="form-group"><label class="form-label">Rasse (optional)</label><input id="f_breed" placeholder="z. B. Mischling"></div>' +
      '<div class="form-group"><label class="form-label">Name Besitzer:in</label><input id="f_owner" placeholder="Dein Name"></div>' +
      '<div class="form-group"><label class="form-label">Telefonnummer</label><input id="f_phone" type="tel" placeholder="+49 …"></div>' +
      '<div class="form-group"><label class="form-label">E-Mail (optional)</label><input id="f_email" type="email"></div>' +
      '<div class="form-group"><label class="form-label">Medizinische Hinweise (optional)</label><textarea id="f_medical" placeholder="Allergien, Medikamente, …"></textarea></div>' +
      '<div class="form-group"><label class="form-label">Finderlohn-Hinweis (optional)</label><input id="f_reward" placeholder="z. B. Finderlohn vorhanden"></div>' +
      '<hr class="divider">' +
      '<div class="form-group"><label class="form-label">Passwort festlegen</label><input id="f_pass" type="password"></div>' +
      '<div class="form-group"><label class="form-label">Passwort bestätigen</label><input id="f_pass2" type="password"></div>' +
      '<div class="stack">' +
        '<button class="btn btn-primary" id="submitRegister">Tag aktivieren</button>' +
        '<button class="btn btn-ghost" id="cancelRegister">Zurück</button>' +
      '</div>';

    document.getElementById('cancelRegister').onclick = renderUnregistered;
    document.getElementById('submitRegister').onclick = async function(){
      const name = document.getElementById('f_name').value.trim();
      const owner = document.getElementById('f_owner').value.trim();
      const phone = document.getElementById('f_phone').value.trim();
      const pass = document.getElementById('f_pass').value;
      const pass2 = document.getElementById('f_pass2').value;
      const errBox = document.getElementById('formError');

      if(!name || !owner || !phone){
        errBox.innerHTML = '<div class="form-error">Bitte Tiername, Besitzer:in und Telefonnummer ausfüllen.</div>';
        return;
      }
      if(pass.length < 4){
        errBox.innerHTML = '<div class="form-error">Passwort muss mindestens 4 Zeichen haben.</div>';
        return;
      }
      if(pass !== pass2){
        errBox.innerHTML = '<div class="form-error">Passwörter stimmen nicht überein.</div>';
        return;
      }

      const profile = {
        petName: name,
        species: document.getElementById('f_species').value,
        breed: document.getElementById('f_breed').value.trim(),
        ownerName: owner,
        phone: phone,
        email: document.getElementById('f_email').value.trim(),
        medical: document.getElementById('f_medical').value.trim(),
        reward: document.getElementById('f_reward').value.trim(),
        password: pass,
        registered: true,
        createdAt: (profileCache && profileCache.createdAt) || new Date().toISOString()
      };
      try{
        await saveProfile(profile);
        renderPublicView(profile);
      }catch(e){
        errBox.innerHTML = '<div class="form-error">Speichern fehlgeschlagen. Bitte erneut versuchen.</div>';
      }
    };
  }

  // ---------- VIEW: public (finder) ----------
  function renderPublicView(profile){
    eyebrow.textContent = 'GEFUNDEN? SO ERREICHST DU ' + (profile.ownerName ? esc(profile.ownerName).toUpperCase() : 'DIE BESITZER:IN');
    card.innerHTML =
      '<div class="tag-id">TAG · ' + esc(tagId) + '</div>' +
      '<h1 class="pet-name">' + esc(profile.petName) + '</h1>' +
      '<div class="pet-sub">' + esc(profile.species) + (profile.breed ? ' · ' + esc(profile.breed) : '') + '</div>' +
      (profile.medical ? '<div class="medical"><span class="field-label">Medizinische Hinweise</span><div class="field-value">'+esc(profile.medical)+'</div></div>' : '') +
      (profile.reward ? '<div class="reward"><span class="field-label">Finderlohn</span><div class="field-value">'+esc(profile.reward)+'</div></div>' : '') +
      '<hr class="divider">' +
      fieldBlock('Besitzer:in', profile.ownerName) +
      fieldBlock('Telefon', profile.phone, 'tel') +
      (profile.email ? fieldBlock('E-Mail', profile.email, 'mailto') : '') +
      '<hr class="divider">' +
      '<button class="btn btn-ghost" id="editBtn">Ich bin Besitzer:in – Daten bearbeiten</button>';
    document.getElementById('editBtn').onclick = function(){ renderLogin(profile); };
    renderFooter(true);
  }

  // ---------- VIEW: login ----------
  function renderLogin(profile){
    eyebrow.textContent = 'ANMELDEN';
    card.innerHTML =
      '<div class="form-title">Daten bearbeiten</div>' +
      '<div class="form-desc">Gib das Passwort ein, das du bei der Einrichtung festgelegt hast.</div>' +
      '<div id="loginError"></div>' +
      '<div class="form-group"><label class="form-label">Passwort</label><input id="loginPass" type="password"></div>' +
      '<div class="stack">' +
        '<button class="btn btn-primary" id="loginSubmit">Anmelden</button>' +
        '<button class="btn btn-ghost" id="loginCancel">Zurück</button>' +
      '</div>';
    document.getElementById('loginCancel').onclick = function(){ renderPublicView(profile); };
    document.getElementById('loginSubmit').onclick = function(){
      const val = document.getElementById('loginPass').value;
      if(val === profile.password){
        renderEditForm(profile);
      }else{
        document.getElementById('loginError').innerHTML = '<div class="form-error">Falsches Passwort.</div>';
      }
    };
  }

  // ---------- VIEW: edit ----------
  function renderEditForm(profile){
    eyebrow.textContent = 'BEARBEITEN';
    card.innerHTML =
      '<div class="form-title">Angaben aktualisieren</div>' +
      '<div class="form-desc">Änderungen sind sofort für alle sichtbar, die das Tag scannen.</div>' +
      '<div id="editError"></div>' +
      '<div class="form-group"><label class="form-label">Name des Tiers</label><input id="e_name" value="'+esc(profile.petName)+'"></div>' +
      '<div class="form-group"><label class="form-label">Tierart</label>' +
        '<select id="e_species">' +
          '<option value="Hund"'+(profile.species==='Hund'?' selected':'')+'>Hund</option>' +
          '<option value="Katze"'+(profile.species==='Katze'?' selected':'')+'>Katze</option>' +
          '<option value="Anderes"'+(profile.species==='Anderes'?' selected':'')+'>Anderes</option>' +
        '</select></div>' +
      '<div class="form-group"><label class="form-label">Rasse (optional)</label><input id="e_breed" value="'+esc(profile.breed||'')+'"></div>' +
      '<div class="form-group"><label class="form-label">Name Besitzer:in</label><input id="e_owner" value="'+esc(profile.ownerName)+'"></div>' +
      '<div class="form-group"><label class="form-label">Telefonnummer</label><input id="e_phone" type="tel" value="'+esc(profile.phone)+'"></div>' +
      '<div class="form-group"><label class="form-label">E-Mail (optional)</label><input id="e_email" type="email" value="'+esc(profile.email||'')+'"></div>' +
      '<div class="form-group"><label class="form-label">Medizinische Hinweise (optional)</label><textarea id="e_medical">'+esc(profile.medical||'')+'</textarea></div>' +
      '<div class="form-group"><label class="form-label">Finderlohn-Hinweis (optional)</label><input id="e_reward" value="'+esc(profile.reward||'')+'"></div>' +
      '<div class="stack">' +
        '<button class="btn btn-primary" id="saveBtn">Speichern</button>' +
        '<button class="btn btn-ghost" id="editCancel">Abbrechen</button>' +
      '</div>';
    document.getElementById('editCancel').onclick = function(){ renderPublicView(profile); };
    document.getElementById('saveBtn').onclick = async function(){
      const updated = Object.assign({}, profile, {
        petName: document.getElementById('e_name').value.trim() || profile.petName,
        species: document.getElementById('e_species').value,
        breed: document.getElementById('e_breed').value.trim(),
        ownerName: document.getElementById('e_owner').value.trim() || profile.ownerName,
        phone: document.getElementById('e_phone').value.trim() || profile.phone,
        email: document.getElementById('e_email').value.trim(),
        medical: document.getElementById('e_medical').value.trim(),
        reward: document.getElementById('e_reward').value.trim()
      });
      try{
        await saveProfile(updated);
        renderPublicView(updated);
      }catch(e){
        document.getElementById('editError').innerHTML = '<div class="form-error">Speichern fehlgeschlagen. Bitte erneut versuchen.</div>';
      }
    };
  }

  // ---------- init ----------
  loadProfile().then(function(profile){
    profileCache = profile;
    if(profile && profile.registered){
      renderPublicView(profile);
    }else{
      renderUnregistered();
    }
  });

  // ================= ADMIN =================
  function initAdmin(){
    const ADMIN_PASSWORD = 'pawtag2026'; // demo only – change before real use, never secure like this in production
    const wrap = document.getElementById('mainWrap');
    wrap.classList.add('admin-wrap');

    function baseUrl(){
      return window.location.origin + window.location.pathname;
    }

    function esc(str){
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function renderGate(){
      wrap.innerHTML =
        '<div class="admin-card admin-gate">' +
          '<div class="admin-title">Admin-Zugang</div>' +
          '<div class="admin-sub">Nur für dich – hier verwaltest du alle Tags.</div>' +
          '<div id="gateError"></div>' +
          '<div class="form-group"><input id="gatePass" type="password" placeholder="Admin-Passwort"></div>' +
          '<button class="btn btn-primary" id="gateSubmit">Anmelden</button>' +
        '</div>';
      document.getElementById('gateSubmit').onclick = function(){
        const val = document.getElementById('gatePass').value;
        if(val === ADMIN_PASSWORD){
          renderDashboard();
        }else{
          document.getElementById('gateError').innerHTML = '<div class="form-error">Falsches Passwort.</div>';
        }
      };
    }

    async function fetchAllTags(){
      const items = [];
      try{
        const snapshot = await getDocs(collection(db, TAGS_COLLECTION));
        snapshot.forEach(function(docSnap){
          items.push({ id: docSnap.id, profile: docSnap.data() });
        });
      }catch(e){
        console.error('Firestore list error:', e);
      }
      items.sort(function(a,b){
        const ta = a.profile.createdAt || '';
        const tb = b.profile.createdAt || '';
        return tb.localeCompare(ta);
      });
      return items;
    }

    function genTagId(){
      return Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
    }

    function tagUrl(id){
      return baseUrl() + '?tag=' + encodeURIComponent(id);
    }

    async function createTag(){
      const id = genTagId();
      const placeholder = { registered: false, createdAt: new Date().toISOString() };
      await setDoc(doc(db, TAGS_COLLECTION, id), placeholder);
      return id;
    }

    function renderQrInto(container, url){
      container.innerHTML = '';
      new QRCode(container, { text: url, width: 76, height: 76, colorDark:'#201C14', colorLight:'#ffffff' });
    }

    function downloadQr(id, url){
      const tempDiv = document.createElement('div');
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);
      new QRCode(tempDiv, { text: url, width: 512, height: 512, colorDark:'#201C14', colorLight:'#ffffff' });
      setTimeout(function(){
        const img = tempDiv.querySelector('img') || tempDiv.querySelector('canvas');
        const dataUrl = img.tagName === 'CANVAS' ? img.toDataURL('image/png') : img.src;
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'tag-' + id + '.png';
        a.click();
        document.body.removeChild(tempDiv);
      }, 120);
    }

    async function renderDashboard(){
      wrap.innerHTML =
        '<div class="admin-card">' +
          '<div class="admin-title">Deine Tags</div>' +
          '<div class="admin-sub">Neue Tags erstellen, QR-Codes generieren und alle Registrierungen einsehen.</div>' +
          '<div class="admin-toolbar">' +
            '<button class="btn btn-primary" id="createBtn" style="width:auto;">+ Neues Tag erstellen</button>' +
            '<button class="mini-btn" id="refreshBtn">Aktualisieren</button>' +
          '</div>' +
          '<div class="tag-list" id="tagList"><div class="empty-state">Lade …</div></div>' +
        '</div>';

      document.getElementById('createBtn').onclick = async function(){
        this.disabled = true;
        await createTag();
        await renderList();
        this.disabled = false;
      };
      document.getElementById('refreshBtn').onclick = renderList;

      await renderList();
    }

    async function renderList(){
      const listEl = document.getElementById('tagList');
      const items = await fetchAllTags();
      if(items.length === 0){
        listEl.innerHTML = '<div class="empty-state">Noch keine Tags. Erstelle dein erstes Tag oben.</div>';
        return;
      }
      listEl.innerHTML = '';
      items.forEach(function(item){
        const url = tagUrl(item.id);
        const registered = !!item.profile.registered;
        const row = document.createElement('div');
        row.className = 'tag-item';
        row.innerHTML =
          '<div class="tag-item-qr" data-qr></div>' +
          '<div class="tag-item-body">' +
            '<div class="tag-item-id">' + esc(item.id) +
              '<span class="badge ' + (registered ? 'badge-active' : 'badge-open') + '">' + (registered ? 'Registriert' : 'Offen') + '</span>' +
            '</div>' +
            (registered ? '<div class="tag-item-pet">' + esc(item.profile.petName) + '</div>' : '') +
            '<div class="tag-item-meta">' + esc(url) + '</div>' +
            '<div class="tag-item-actions">' +
              '<button class="mini-btn" data-open>Seite öffnen</button>' +
              '<button class="mini-btn" data-copy>Link kopieren</button>' +
              '<button class="mini-btn" data-dl>QR herunterladen</button>' +
              '<button class="mini-btn danger" data-del>Löschen</button>' +
            '</div>' +
          '</div>';
        listEl.appendChild(row);

        renderQrInto(row.querySelector('[data-qr]'), url);

        row.querySelector('[data-open]').onclick = function(){ window.open(url, '_blank'); };
        row.querySelector('[data-copy]').onclick = function(){
          navigator.clipboard.writeText(url).then(function(){
            this.textContent = 'Kopiert!';
            setTimeout(() => { this.textContent = 'Link kopieren'; }, 1500);
          }.bind(this));
        };
        row.querySelector('[data-dl]').onclick = function(){ downloadQr(item.id, url); };
        row.querySelector('[data-del]').onclick = async function(){
          if(!confirm('Tag ' + item.id + ' wirklich löschen? Das kann nicht rückgängig gemacht werden.')) return;
          await deleteDoc(doc(db, TAGS_COLLECTION, item.id));
          await renderList();
        };
      });
    }

    renderGate();
  }
})();
</script>
</body>
</html>
